name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Python (only if detected)
      - name: Set up Python
        if: ${{ hashFiles('requirements.txt', 'pyproject.toml') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install Python lint tools
        if: ${{ hashFiles('requirements.txt', 'pyproject.toml') != '' }}
        run: |
          python -m pip install -U pip
          pip install ruff

      # ---- Node (only if detected)
      - name: Set up Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        if: ${{ hashFiles('package.json') != '' }}
        run: npm ci || npm install

      # ---- Rust (only if detected)
      - name: Set up Rust
        if: ${{ hashFiles('Cargo.toml') != '' }}
        uses: dtolnay/rust-toolchain@stable

      # ---- Go (only if detected)
      - name: Set up Go
        if: ${{ hashFiles('go.mod') != '' }}
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true

      - name: Install golangci-lint (Go lint)
        if: ${{ hashFiles('go.mod') != '' }}
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b $(go env GOPATH)/bin v1.57.2
          golangci-lint version

      # ---- Run lint (FAILS if lint fails)
      - name: Run lint (Bundle 7)
        run: bash scripts/lint.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Python
      - name: Set up Python
        if: ${{ hashFiles('requirements.txt', 'pyproject.toml') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install Python deps (requirements.txt)
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install pytest

      - name: Install Python test tools (pyproject only)
        if: ${{ hashFiles('pyproject.toml') != '' && hashFiles('requirements.txt') == '' }}
        run: |
          python -m pip install -U pip
          pip install pytest

      # ---- Node
      - name: Set up Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        if: ${{ hashFiles('package.json') != '' }}
        run: npm ci || npm install

      # ---- Rust
      - name: Set up Rust
        if: ${{ hashFiles('Cargo.toml') != '' }}
        uses: dtolnay/rust-toolchain@stable

      # ---- Go
      - name: Set up Go
        if: ${{ hashFiles('go.mod') != '' }}
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true

      # ---- .NET
      - name: Set up .NET
        if: ${{ hashFiles('*.sln', '**/*.csproj') != '' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ---- Run tests (FAILS if tests fail)
      - name: Run tests (Bundle 7)
        run: bash scripts/run-tests.sh
