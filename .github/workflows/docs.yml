name: Docs

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python (for MkDocs)
        if: ${{ hashFiles('mkdocs.yml') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install MkDocs
        if: ${{ hashFiles('mkdocs.yml') != '' }}
        run: |
          python -m pip install -U pip
          pip install mkdocs mkdocs-material

      - name: Build docs (Bundle 7)
        if: ${{ hashFiles('mkdocs.yml') != '' }}
        run: bash scripts/build-docs.sh build

      - name: Skip (no mkdocs.yml)
        if: ${{ hashFiles('mkdocs.yml') == '' }}
        run: echo "No mkdocs.yml found. Skipping docs build."
